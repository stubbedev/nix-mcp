name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            os: ubuntu-latest
          - goos: linux
            goarch: arm64
            os: ubuntu-latest
          - goos: darwin
            goarch: amd64
            os: macos-latest
          - goos: darwin
            goarch: arm64
            os: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="nix-mcp-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "dist/$STAGE"
          export CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}
          go build -trimpath \
            -ldflags="-s -w -X github.com/stubbedev/nix-mcp/version.Version=${VERSION}" \
            -o "dist/$STAGE/nix-mcp" .
          cp README.md LICENSE "dist/$STAGE/" 2>/dev/null || true
          cd dist
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/nix-mcp-*.tar.gz*
          retention-days: 7

  cache:
    name: push nix build to attic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Build package
        run: nix build .#nix-mcp -L --print-out-paths | tee /tmp/outpaths

      - name: Push to attic
        continue-on-error: true
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          nix run nixpkgs#attic-client -- login stubbe https://nix.stubbe.dev "$ATTIC_TOKEN"
          for attempt in 1 2 3; do
            if nix run nixpkgs#attic-client -- push default $(cat /tmp/outpaths); then
              exit 0
            fi
            echo "::warning::attic push attempt $attempt failed; retrying in $((attempt * 30))s"
            sleep $((attempt * 30))
          done
          echo "::warning::attic push failed after 3 attempts; cache push is best-effort, continuing"

  release:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - run: ls -la dist/
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
